<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 05 - Profile Settings Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="05-form-settings.css">
  </head>
  <body>
    <header>
      <h1>Profile Settings</h1>
    </header>

    <main>
      <form>
        <section class="avatar-section">
          <div class="avatar-wrapper">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&h=150&fit=crop&crop=faces" alt="Profile Picture" id="avatarPreview">
            <label for="avatarUpload" class="upload-badge">
              <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="avatarUpload" accept="image/*" style="display: none;" />
          </div>
         
        </section>

        <section>
          <h2><i class="fa-regular fa-user"></i> Account</h2>
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" placeholder="e.g. Jane Doe" value="Jane Doe" />
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="name@example.com" value="jane.doe@example.com" />
          </div>

          <div class="input-group">
            <label for="language">Language</label>
            <div class="select-wrapper">
              <select id="language">
                <option>English</option>
                <option selected>Vietnamese</option>
                <option>Japanese</option>
              </select>
            </div>
          </div>
        </section>

        <section>
          <h2><i class="fa-regular fa-bell"></i> Preferences</h2>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" checked />
              <span class="custom-checkbox"></span>
              <span class="label-text">Email notifications</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" />
              <span class="custom-checkbox"></span>
              <span class="label-text">Marketing updates</span>
            </label>
          </div>

          <div class="input-group">
            <label for="theme">Theme</label>
            <div class="select-wrapper">
              <select id="theme">
                <option>Light</option>
                <option>Dark</option>
                <option selected>System</option>
              </select>
            </div>
          </div>
        </section>

        <section class="security-section">
          <h2><i class="fa-solid fa-shield-halved"></i> Security</h2>
          <div class="button-row">
            <button type="button" class="btn-secondary-action"><i class="fa-solid fa-key"></i> Change Password</button>
            <button type="button" class="btn-secondary-action"><i class="fa-solid fa-lock"></i> Enable 2FA</button>
          </div>
        </section>

        <div class="form-actions">
          <button type="submit" class="btn-submit">Save Changes</button>
          <button type="button" class="btn-cancel">Cancel</button>
        </div>
      </form>
    </main>
  </body>
</html>
