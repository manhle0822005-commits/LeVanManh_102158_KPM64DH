<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Mobile Home</title>
    <link rel="stylesheet" href="01-mobile-home.css" />
  </head>
  <body>
    <header>
      <h1>City Explorer</h1>
      <button type="button">Search</button>
    </header>

    <main>
      <section class="hero">
        <img src="https://dulichsaigon.edu.vn/wp-content/uploads/2025/10/2_thanh-pho-ve-dem.jpg" alt="City view" />
        <h2>Welcome Back</h2>
        <p>Plan your next weekend in one tap.</p>
      </section>

      <section>
        <h2>Popular Places</h2>
        <article>
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Warsaw_Old_Town_Market_Square_10.JPG/1280px-Warsaw_Old_Town_Market_Square_10.JPG"
            alt="Old Town Market"
          />
          <h3>Old Town Market</h3>
          <p>Food and crafts</p>
          <button type="button">View</button>
        </article>
        <article>
          <img
            src="https://dulichsaigon.edu.vn/wp-content/uploads/2025/10/2_thanh-pho-ve-dem.jpg"
            alt="River Walk"
          />
          <h3>River Walk</h3>
          <p>Morning trail</p>
          <button type="button">View</button>
        </article>
        <article>
          <img
            src="https://www.kiettacnghethuat.com/wp-content/uploads/nghe-thuat-duong-pho-street-art-la-gi.jpg"
            alt="Art Street"
          />
          <h3>Art Street</h3>
          <p>Weekend events</p>
          <button type="button">View</button>
        </article>
      </section>
    </main>

    <nav>
      <a href="#">Home</a>
      <a href="#">Map</a>
      <a href="#">Saved</a>
      <a href="#">Profile</a>
    </nav>
  </body>
</html>
